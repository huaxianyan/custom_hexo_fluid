name: Update Release

on:
  workflow_dispatch:
  schedule:
    - cron: '7 7 * * *'

jobs:
  update-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写权限才能推送到仓库和发布 Release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and Rebuild
        id: check_step
        run: |
          # 1. 获取远程最新版本
          LATEST_TAG=$(curl -s https://api.github.com/repos/fluid-dev/hexo-theme-fluid/releases/latest | jq -r '.tag_name')
          
          # 2. 读取本地版本
          if [ -f version ]; then
            LOCAL_TAG=$(cat version)
          else
            LOCAL_TAG=""
          fi

          if [ "$LATEST_TAG" = "$LOCAL_TAG" ]; then
            echo "No update needed."
            echo "NEED_UPDATE=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Updating to $LATEST_TAG"
          echo "NEED_UPDATE=true" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT

          # 3. 下载并解压 (使用临时目录避免污染)
          curl -L -o theme.tar.gz "https://github.com/fluid-dev/hexo-theme-fluid/archive/refs/tags/${LATEST_TAG}.tar.gz"
          mkdir -p build_dir
          tar -xzf theme.tar.gz -C build_dir --strip-components=1

          # 4. 覆盖自定义内容并打包
          # 假设你的 scripts 和 source 在当前仓库根目录
          cp -r scripts source build_dir/
          
          mkdir -p dist
          cd build_dir
          zip -r "../dist/hexo-theme-fluid-${LATEST_TAG}.zip" .
          cd ..

          # 5. 更新本地版本文件并提交
          echo "$LATEST_TAG" > version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: update theme to $LATEST_TAG"
          git push

      - name: Create Release
        if: steps.check_step.outputs.NEED_UPDATE == 'true'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./dist/*"
          allowUpdates: true
          tag: ${{ steps.check_step.outputs.VERSION_TAG }}
          body: "Auto-generated release for version ${{ steps.check_step.outputs.VERSION_TAG }}"
          token: ${{ secrets.GITHUB_TOKEN }}

      # 自动保活步骤：如果 50 天没更新，自动触发一个 commit 
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
